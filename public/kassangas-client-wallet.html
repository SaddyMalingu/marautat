<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kassangas Wallet | Scan & Pay</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Bebas+Neue&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
  <style>
    :root {
      --bg-1: #081421;
      --bg-2: #132a43;
      --accent: #ff8a00;
      --accent-2: #ffd166;
      --mint: #7ef9c8;
      --panel: rgba(10, 22, 36, 0.82);
      --text: #f3f7fa;
      --muted: #b8c7d6;
      --ok: #65d88f;
      --danger: #ff5d5d;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Space Grotesk", sans-serif;
      color: var(--text);
      background: linear-gradient(145deg, var(--bg-1), var(--bg-2));
      display: grid;
      place-items: center;
      padding: 16px;
    }

    .wallet { width: min(700px, 100%); }
    .card { background: var(--panel); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 24px; }
    h1 { margin: 0 0 6px; font-size: 1.8rem; color: var(--accent-2); }
    .sub { color: var(--muted); margin: 0 0 16px; }
    
    .scanner-wrapper { position: relative; margin: 12px 0; background: #000; border-radius: 12px; overflow: hidden; max-width: 400px; }
    #scanner { display: none; width: 100% !important; height: auto !important; max-width: 400px; border-radius: 12px; }
    #scannerVideo { display: none; }
    .scan-info { color: var(--muted); font-size: 0.9rem; padding: 12px; border-radius: 8px; background: rgba(255,209,102,0.08); }
    .scan-corner { position: absolute; width: 24px; height: 24px; border-color: var(--mint); border-style: solid; opacity: 0.8; }
    .scan-corner.tl { top: 10px; left: 10px; border-width: 3px 0 0 3px; border-radius: 4px 0 0 0; }
    .scan-corner.tr { top: 10px; right: 10px; border-width: 3px 3px 0 0; border-radius: 0 4px 0 0; }
    .scan-corner.bl { bottom: 10px; left: 10px; border-width: 0 0 3px 3px; border-radius: 0 0 0 4px; }
    .scan-corner.br { bottom: 10px; right: 10px; border-width: 0 3px 3px 0; border-radius: 0 0 4px 0; }
    .upload-hint { font-size: 0.82rem; color: var(--muted); text-align: center; margin-top: 6px; }
    #qrUpload { display: none; }
    .upload-btn { background: rgba(255,255,255,0.1); color: var(--text); width: 100%; margin-top: 6px; border: 1px dashed rgba(255,255,255,0.25); }
    
    .tabs { display: flex; gap: 8px; margin-bottom: 16px; }
    .tab-btn { flex: 1; padding: 10px; border: 0; border-radius: 8px; background: rgba(255,255,255,0.1); color: var(--text); cursor: pointer; font-weight: 600; transition: background 200ms; }
    .tab-btn.active { background: var(--accent); color: #081421; }
    
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    
    .field { display: grid; gap: 4px; margin-bottom: 12px; }
    label { font-size: 0.85rem; color: #d2deea; }
    input { border: 1px solid rgba(255,255,255,0.14); border-radius: 8px; background: rgba(4,12,20,0.8); color: var(--text); padding: 10px 12px; font-size: 0.95rem; font-family: inherit; outline: none; }
    input:focus { border-color: var(--accent-2); }
    
    button { border: 0; border-radius: 10px; padding: 12px 16px; font-family: inherit; font-weight: 700; font-size: 1rem; cursor: pointer; transition: transform 140ms; }
    .scan-btn, .pay-btn { background: linear-gradient(90deg, var(--accent), var(--accent-2)); color: #081421; width: 100%; margin-top: 8px; }
    .scan-btn:disabled, .pay-btn:disabled { opacity: 0.6; cursor: not-allowed; }
    
    .status { margin-top: 12px; padding: 10px; border-radius: 8px; font-size: 0.9rem; display: none; }
    .status.show { display: block; }
    .status.ok { background: rgba(101,216,143,0.15); color: #bef2ce; border: 1px solid rgba(101,216,143,0.45); }
    .status.error { background: rgba(255,93,93,0.12); color: #ffd0d0; border: 1px solid rgba(255,93,93,0.45); }
    
    .txn-details { background: rgba(126,249,200,0.08); border: 1px solid rgba(126,249,200,0.3); border-radius: 10px; padding: 12px; margin-top: 12px; display: none; }
    .txn-details.show { display: block; }
    .txn-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 0.95rem; }
    .txn-row strong { color: var(--accent-2); }
    
    @media (max-width: 600px) { .card { padding: 18px; } h1 { font-size: 1.3rem; } }
  </style>
</head>
<body>
  <div class="wallet">
    <div class="card">
      <h1>💳 Kassangas Wallet</h1>
      <p class="sub">Scan merchant QR or paste your phone number to pay</p>

      <div class="tabs">
        <button class="tab-btn active" data-tab="scanner">📱 Scan QR</button>
        <button class="tab-btn" data-tab="manual">💰 Manual</button>
        <button class="tab-btn" data-tab="history">📋 History</button>
      </div>

      <!-- SCANNER TAB -->
      <div id="scanner-tab" class="tab-content active">
        <div class="scan-info" id="scanHint">Use camera to scan QR, or upload a screenshot of the QR code.</div>
        <div class="scanner-wrapper" id="scannerWrapper" style="display:none;">
          <canvas id="scanner"></canvas>
          <video id="scannerVideo" style="display:none;"></video>
          <div class="scan-corner tl"></div>
          <div class="scan-corner tr"></div>
          <div class="scan-corner bl"></div>
          <div class="scan-corner br"></div>
        </div>
        <button class="scan-btn" id="startScanBtn">📷 Start Camera</button>
        <input type="file" id="qrUpload" accept="image/*" />
        <button class="upload-btn" id="uploadQrBtn">📎 Upload QR Image (Desktop)</button>
        <p class="upload-hint">On PC: screenshot the merchant QR code, then upload it here.</p>
        <div id="scanStatus" class="status" aria-live="polite"></div>
        <div id="scannedTxn" class="txn-details"></div>
      </div>

      <!-- MANUAL TAB -->
      <div id="manual-tab" class="tab-content">
        <div class="field">
          <label for="manualPhone">Your M-Pesa Number</label>
          <input id="manualPhone" type="tel" placeholder="2547XXXXXXXX" />
        </div>
        <div id="manualStatus" class="status" aria-live="polite"></div>
        <div id="manualTxn" class="txn-details"></div>
      </div>

      <!-- HISTORY TAB -->
      <div id="history-tab" class="tab-content">
        <div id="historyList" style="font-size: 0.9rem; color: var(--muted);">No transactions yet</div>
      </div>
    </div>
  </div>

  <script>
    const tabs = document.querySelectorAll(".tab-btn");
    const tabContents = document.querySelectorAll(".tab-content");
    const startScanBtn = document.getElementById("startScanBtn");
    const scannerCanvas = document.getElementById("scanner");
    const scannerVideo = document.getElementById("scannerVideo");
    const manualPhoneInput = document.getElementById("manualPhone");
    let scanning = false;
    let currentTemplate = null;
    let cameraStream = null;

    function showStatus(elemId, type, msg) {
      const elem = document.getElementById(elemId);
      elem.className = `status show ${type}`;
      elem.textContent = msg;
    }

    function showTransactionDetails(txn, elemId) {
      const elem = document.getElementById(elemId);
      elem.innerHTML = `
        <div class="txn-row"><span>Description:</span> <strong>${txn.itemName}</strong></div>
        <div class="txn-row"><span>Amount:</span> <strong>KES ${txn.amount}</strong></div>
        <div class="txn-row"><span>Status:</span> <strong>Ready to pay</strong></div>
        <input type="tel" id="${elemId}-phone" placeholder="2547XXXXXXXX" style="width: 100%; margin-top: 10px;" />
        <button class="pay-btn" onclick="confirmPayment('${txn.templateId || ""}', '${elemId}')">Confirm & Pay</button>
      `;
      elem.classList.add("show");
    }

    const scannerWrapper = document.getElementById("scannerWrapper");
    const uploadQrBtn = document.getElementById("uploadQrBtn");
    const qrUploadInput = document.getElementById("qrUpload");

    function stopCamera() {
      scanning = false;
      if (cameraStream) {
        cameraStream.getTracks().forEach(track => track.stop());
        cameraStream = null;
      }
      scannerVideo.pause();
      scannerVideo.srcObject = null;
      scannerWrapper.style.display = "none";
      scannerCanvas.style.display = "none";
      startScanBtn.textContent = "📷 Start Camera";
    }

    function waitForVideoReady(videoElem) {
      return new Promise(resolve => {
        if (videoElem.readyState >= 2 && videoElem.videoWidth > 0 && videoElem.videoHeight > 0) {
          resolve();
          return;
        }

        const onReady = () => {
          if (videoElem.videoWidth > 0 && videoElem.videoHeight > 0) {
            videoElem.removeEventListener("loadedmetadata", onReady);
            videoElem.removeEventListener("canplay", onReady);
            resolve();
          }
        };

        videoElem.addEventListener("loadedmetadata", onReady);
        videoElem.addEventListener("canplay", onReady);
      });
    }

    async function fetchAndShowTemplate(templateId, targetElemId = "scannedTxn", statusElemId = "scanStatus") {
      try {
        const res = await fetch(`/api/kassangas/template/${templateId}`);
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || "Template fetch failed");

        showTransactionDetails({
          itemName: data.itemName,
          amount: data.amount,
          templateId
        }, targetElemId);
      } catch (err) {
        showStatus(statusElemId, "error", "Invalid QR code: " + err.message);
      }
    }

    function normalizePhone(phone) {
      let val = String(phone || "").trim().replace(/\s+/g, "");
      if (val.startsWith("+")) val = val.slice(1);
      if (val.startsWith("0")) val = "254" + val.slice(1);
      if (/^7\d{8}$/.test(val)) val = "254" + val;
      return val;
    }

    // Tab switching
    tabs.forEach(btn => {
      btn.addEventListener("click", () => {
        const tabName = btn.getAttribute("data-tab");
        tabs.forEach(b => b.classList.remove("active"));
        tabContents.forEach(c => c.classList.remove("active"));
        btn.classList.add("active");
        document.getElementById(`${tabName}-tab`).classList.add("active");

        if (tabName !== "scanner") stopCamera();
        if (tabName === "history") loadHistory();
        if (tabName === "scanner" && !scanning) startScanBtn.textContent = "Start Camera";
      });
    });

    // Parse template from URL (direct link flow)
    const params = new URLSearchParams(window.location.search);
    if (params.has("t")) {
      currentTemplate = params.get("t");
      fetchAndShowTemplate(currentTemplate, "scannedTxn", "scanStatus");
      fetchAndShowTemplate(currentTemplate, "manualTxn", "manualStatus");
      showStatus("manualStatus", "ok", "Template loaded. Enter phone to pay.");
    }

    // Camera scanner
    startScanBtn.addEventListener("click", async () => {
      if (scanning) { stopCamera(); return; }

      try {
        cameraStream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: { ideal: "environment" } }
        });
        scannerVideo.srcObject = cameraStream;
        await scannerVideo.play();
        await waitForVideoReady(scannerVideo);

        // Show wrapper; canvas display controlled inside processFrame
        scannerWrapper.style.display = "block";
        scannerCanvas.style.display = "block";
        // Reset CSS display size — buffer size set per-frame, display constrained by CSS
        scannerCanvas.style.width = "100%";
        scannerCanvas.style.height = "auto";
        scanning = true;
        startScanBtn.textContent = "⏹ Stop Camera";
        showStatus("scanStatus", "ok", "Scanning… hold QR steady in the frame.");
        processFrame();
      } catch (err) {
        stopCamera();
        showStatus("scanStatus", "error", "Camera error: " + err.message + ". Try uploading a screenshot instead.");
      }
    });

    function processFrame() {
      if (!scanning) return;
      const w = scannerVideo.videoWidth;
      const h = scannerVideo.videoHeight;
      if (!w || !h) { requestAnimationFrame(processFrame); return; }

      // Set canvas buffer to video resolution for accurate decode
      if (scannerCanvas.width !== w) scannerCanvas.width = w;
      if (scannerCanvas.height !== h) scannerCanvas.height = h;
      // Re-apply CSS display size so it doesn't stretch visually
      scannerCanvas.style.width = "100%";
      scannerCanvas.style.height = "auto";

      const ctx = scannerCanvas.getContext("2d");
      ctx.drawImage(scannerVideo, 0, 0, w, h);

      const code = jsQR(ctx.getImageData(0, 0, w, h).data, w, h);
      if (code && code.data) {
        stopCamera();
        handleScannedData(code.data);
        return;
      }
      requestAnimationFrame(processFrame);
    }

    // Upload QR image — works great on desktop
    uploadQrBtn.addEventListener("click", () => qrUploadInput.click());
    qrUploadInput.addEventListener("change", (e) => {
      const file = e.target.files[0];
      if (!file) return;
      showStatus("scanStatus", "ok", "Reading QR from image…");

      const img = new Image();
      const reader = new FileReader();
      reader.onload = (ev) => {
        img.onload = () => {
          // Use offscreen canvas at image's natural resolution
          const offscreen = document.createElement("canvas");
          offscreen.width = img.naturalWidth;
          offscreen.height = img.naturalHeight;
          const ctx = offscreen.getContext("2d");
          ctx.drawImage(img, 0, 0);
          const imageData = ctx.getImageData(0, 0, offscreen.width, offscreen.height);
          const code = jsQR(imageData.data, offscreen.width, offscreen.height);
          if (code && code.data) {
            handleScannedData(code.data);
          } else {
            showStatus("scanStatus", "error", "No QR code found in image. Try a clearer screenshot.");
          }
          qrUploadInput.value = "";
        };
        img.src = ev.target.result;
      };
      reader.readAsDataURL(file);
    });

    function handleScannedData(data) {
      try {
        const parsedUrl = new URL(data);
        const templateId = parsedUrl.searchParams.get("t");
        if (!templateId) { showStatus("scanStatus", "error", "Invalid QR: no template found"); return; }
        currentTemplate = templateId;
        fetchAndShowTemplate(templateId, "scannedTxn", "scanStatus");
        fetchAndShowTemplate(templateId, "manualTxn", "manualStatus");
        showStatus("scanStatus", "ok", "QR decoded! Enter your phone number below and confirm.");
      } catch (_) {
        showStatus("scanStatus", "error", "Invalid QR content");
      }
    }

    // Confirm and pay
    window.confirmPayment = async (templateId, elemId) => {
      const phoneInput = document.getElementById(`${elemId}-phone`) || manualPhoneInput;
      const normalizedPhone = normalizePhone(phoneInput?.value || "");
      const statusId = elemId === "scannedTxn" ? "scanStatus" : "manualStatus";
      const effectiveTemplateId = templateId || currentTemplate;

      if (!effectiveTemplateId) {
        showStatus(statusId, "error", "No template loaded. Scan QR or open wallet link with ?t=...");
        return;
      }

      if (!/^2547\d{8}$/.test(normalizedPhone)) {
        showStatus(statusId, "error", "Invalid phone. Use 2547XXXXXXXX");
        return;
      }

      try {
        showStatus(statusId, "ok", "Triggering M-Pesa prompt...");
        const res = await fetch("/api/kassangas/payment-intent", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            templateId: effectiveTemplateId,
            phone: normalizedPhone
          })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || "Payment failed");

        showStatus(statusId, "ok", "STK sent to " + normalizedPhone + ". Enter your M-Pesa PIN.");
        setTimeout(() => loadHistory(), 2000);
      } catch (err) {
        showStatus(statusId, "error", err.message);
      }
    };

    manualPhoneInput.addEventListener("input", () => {
      if (!currentTemplate) {
        showStatus("manualStatus", "error", "Scan QR or open a payment link to load a template first.");
        return;
      }
      const normalizedPhone = normalizePhone(manualPhoneInput.value || "");
      if (normalizedPhone) showStatus("manualStatus", "ok", "Ready to pay with " + normalizedPhone);
    });

    async function loadHistory() {
      document.getElementById("historyList").innerHTML = '<p style="color: var(--muted);">Loading transactions...</p>';
      try {
        const res = await fetch("/api/kassangas/payment-intents");
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || "Failed to load history");

        if (data.intents && data.intents.length > 0) {
          document.getElementById("historyList").innerHTML = data.intents
            .map(t => `<div style="padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.1);">
              <strong>${t.item_name}</strong> - KES ${t.amount} (${t.status})<br/>
              <small>${new Date(t.created_at).toLocaleString()}</small>
            </div>`)
            .join("");
        } else {
          document.getElementById("historyList").innerHTML = '<p style="color: var(--muted);">No transactions yet</p>';
        }
      } catch (err) {
        document.getElementById("historyList").innerHTML = '<p style="color: #ff5d5d;">' + err.message + '</p>';
      }
    }

    window.addEventListener("pagehide", stopCamera);
    window.addEventListener("beforeunload", stopCamera);
    document.addEventListener("visibilitychange", () => {
      if (document.hidden) stopCamera();
    });
  </script>
</body>
</html>
