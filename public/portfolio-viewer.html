<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Alphadome Portfolio Viewer</title>
  <style>
    :root {
      --bg: #020617;
      --panel: rgba(15, 23, 42, 0.84);
      --stroke: rgba(148, 163, 184, 0.26);
      --text: #e2e8f0;
      --muted: #94a3b8;
      --brand: #22d3ee;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      height: 100%;
      font-family: Inter, "Segoe UI", Arial, sans-serif;
      color: var(--text);
      background: radial-gradient(circle at 18% 10%, rgba(34, 211, 238, 0.14), transparent 35%),
                  radial-gradient(circle at 82% 15%, rgba(129, 140, 248, 0.15), transparent 30%),
                  var(--bg);
    }

    .shell {
      height: 100%;
      display: grid;
      grid-template-rows: auto 1fr;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.8rem;
      padding: 0.72rem 0.9rem;
      background: var(--panel);
      border-bottom: 1px solid var(--stroke);
      backdrop-filter: blur(10px);
    }

    .left {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      min-width: 0;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: var(--brand);
      box-shadow: 0 0 14px rgba(34, 211, 238, 0.9);
      flex: 0 0 auto;
    }

    .title {
      font-weight: 700;
      letter-spacing: 0.01em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .actions {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .btn {
      appearance: none;
      border: 1px solid var(--stroke);
      background: rgba(15, 23, 42, 0.7);
      color: var(--text);
      border-radius: 10px;
      padding: 0.44rem 0.72rem;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
    }

    .btn:hover {
      border-color: rgba(34, 211, 238, 0.6);
      color: #cffafe;
    }

    #viewer {
      width: 100%;
      height: 100%;
      border: 0;
      background: #fff;
      display: block;
    }

    .fallback {
      display: none;
      place-items: center;
      text-align: center;
      padding: 1rem;
      color: var(--muted);
    }

    .loading {
      display: grid;
      place-items: center;
      text-align: center;
      padding: 1rem;
      color: var(--muted);
      background: radial-gradient(circle at 50% 40%, rgba(34, 211, 238, 0.09), transparent 52%);
    }

    .loading .box {
      max-width: 640px;
      background: var(--panel);
      border: 1px solid var(--stroke);
      border-radius: 14px;
      padding: 1.1rem;
    }

    .loading h2 {
      margin: 0 0 0.5rem 0;
      color: var(--text);
      font-size: 1.05rem;
    }

    .loading p {
      margin: 0;
      line-height: 1.55;
    }

    .fallback .box {
      max-width: 640px;
      background: var(--panel);
      border: 1px solid var(--stroke);
      border-radius: 14px;
      padding: 1.1rem;
    }

    .fallback h2 {
      margin: 0 0 0.5rem 0;
      color: var(--text);
      font-size: 1.05rem;
    }

    .fallback p {
      margin: 0 0 0.8rem 0;
      line-height: 1.55;
    }

    @media (max-width: 700px) {
      .topbar {
        flex-direction: column;
        align-items: stretch;
      }

      .actions {
        justify-content: stretch;
      }

      .actions .btn {
        text-align: center;
        flex: 1 1 auto;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <div class="left">
        <span class="dot"></span>
        <div class="title" id="agent-title">Portfolio Viewer</div>
      </div>
      <div class="actions">
        <a class="btn" href="/portfolio.html">Back to Portfolio</a>
      </div>
    </header>

    <iframe id="viewer" allowfullscreen loading="eager" referrerpolicy="no-referrer"></iframe>

    <section class="loading" id="loading">
      <div class="box">
        <h2>Loading portfolio preview…</h2>
        <p>Please wait while we open this agent in full-screen view.</p>
      </div>
    </section>

    <section class="fallback" id="fallback">
      <div class="box">
        <h2>Preview blocked by source site</h2>
        <p>This demo cannot be embedded in-frame by the source provider. You can still open it directly in full page.</p>
        <a class="btn" id="open-direct" href="#" target="_self" rel="noopener">Open Full Demo</a>
      </div>
    </section>
  </div>

  <script>
    (function () {
      const params = new URLSearchParams(window.location.search);
      const agent = params.get("agent") || "Agent";
      const agentSources = {
        "coach-dawn-3-0": "https://coach-dawn-3-0-djqhjxa.gamma.site/",
        "soma-katiba-3-0": "https://somakatiba3-ca3yt4c.gamma.site/",
        "malingu-global-supplies-3-0": "https://malingu-global-supplies-lqwyn4t.gamma.site/",
        "agent-purity-3-0": "https://gamma.app/docs/Agent-Purity-30-Your-Financial-Guide-s3hv5wrwooi6err?mode=doc",
        "denim-and-diamonds-3-0": "https://denim-and-diamonds-kc6heb5.gamma.site/",
        "one-odundo-3-0": "https://accurate-football-predic-h8ctcpj.gamma.site/",
        "tour-guide-dennis-3-0": "https://tour-guide-dennis-c76329s.gamma.site/",
        "coach-peter-3-0": "https://coach-peter-3-0-s6ufezp.gamma.site/",
        "vet-martin-3-0": "https://vet-martin-w3zxuyb.gamma.site/",
        "rahim-boutique-3-0": "https://rahim-boutique-5skbi0x.gamma.site/",
        "house-of-annie-events-and-tours-3-0": "https://house-of-annie-62socx0.gamma.site/",
        "agent-saleh-3-0": "https://agent-saleh-3-0-d2tdqo4.gamma.site/",
        "agent-tekla-3-0": "https://agent-tekla-30-19w4spk.gamma.site/",
        "lifeline-cancer-trust-3-0": "https://lifeline-cancer-trust-lqjwob4.gamma.site/",
        "bijo-gas-and-accessories-3-0": "https://bijo-gas-ndi0xgu.gamma.site/",
        "mawani-3-0": "https://mawani3-0-22y21j9.gamma.site/",
        "sharon-beauty-3-0": "https://sharon-beauty-3-0-408eiak.gamma.site/",
        "dr-cindy-3-0": "https://dr-cindy-3-0-3okwhvt.gamma.site/",
        "virtual-assistant-abby-3-0": "https://virtual-assistant-abby-3-6l3ed3p.gamma.site/",
        "malingu-contractor-3-0": "https://malingu-contractor-3-0-6ts3yzw.gamma.site/",
        "mary-msoh-communications-solutions-3-0": "https://mary-msoh-comm-9aou1xd.gamma.site/",
        "general-apollo-3-0": "https://general-apollo-3-0-7zjdtt0.gamma.site/",
        "building-plans-3-0": "https://building-plans-3-0-i0qy3el.gamma.site/",
        "craydel-africa-travel-3-0": "https://craydel-africa-travel-l7axd0p.gamma.site/",
        "elegance-aesthetic-spa-3-0": "https://elegance-aesthetic-spa-i56iu7t.gamma.site/",
        "amir-3-0": "https://amir-3-0-jbdx7m3.gamma.site/",
        "pbc-3-0": "https://pbc-3-0-7hl0qkv.gamma.site/",
        "urban-craft-3-0": "https://urbancraft30-x14plq1.gamma.site/"
      };

      const src = agentSources[agent] || "";

      document.getElementById("agent-title").textContent = `Alphadome • ${agent.replace(/-/g, " ")}`;

      const iframe = document.getElementById("viewer");
      const loading = document.getElementById("loading");
      const fallback = document.getElementById("fallback");
      const openDirect = document.getElementById("open-direct");

      let fallbackShown = false;

      const showFallback = () => {
        if (fallbackShown) return;
        fallbackShown = true;
        loading.style.display = "none";
        fallback.style.display = "grid";
      };

      if (!src) {
        iframe.style.display = "none";
        loading.style.display = "none";
        fallback.style.display = "grid";
        openDirect.style.display = "none";
        return;
      }

      openDirect.href = src;
      iframe.src = src;

      iframe.addEventListener("load", () => {
        if (fallbackShown) return;
        loading.style.display = "none";
        fallback.style.display = "none";

        setTimeout(() => {
          if (fallbackShown) return;
          try {
            const href = iframe.contentWindow?.location?.href || "";
            if (href === "about:blank") {
              showFallback();
            }
          } catch {
            // Cross-origin content loaded successfully; access is restricted by browser policy.
          }
        }, 1200);
      });

      iframe.addEventListener("error", () => {
        showFallback();
      });
    })();
  </script>
</body>
</html>
