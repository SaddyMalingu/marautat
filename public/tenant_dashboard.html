<!-- Full dashboard HTML copied from admin/tenant_dashboard.html -->

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Tenant Dashboard | Alphadome</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <style>
    body { font-family: 'Inter', system-ui, Arial, sans-serif; background: linear-gradient(120deg, #181c2f 0%, #232a4d 100%); color: #e6e8ee; min-height: 100vh; }
    .tenant-header { background: linear-gradient(90deg,#38bdf8 0%,#232a4d 100%); color: #fff; padding: 32px 0 24px 0; text-align: center; }
    .tenant-header .logo { font-size: 2.2rem; font-weight: 700; letter-spacing: 1px; }
    .tenant-header .brand { font-size: 1.2rem; color: #a5eaff; margin-top: 8px; }
    .dashboard-cards { display: flex; flex-wrap: wrap; gap: 24px; margin: 32px auto 0 auto; justify-content: center; max-width: 1100px; }
    .dashboard-card { background: #181c2f; border-radius: 18px; border: 1px solid #232a4d; box-shadow: 0 2px 16px 0 rgba(30,39,71,0.10); padding: 32px 24px 28px 24px; flex: 1 1 220px; min-width: 180px; max-width: 340px; transition: box-shadow 0.2s, transform 0.2s; margin-bottom: 8px; }
    .dashboard-card:hover { box-shadow: 0 4px 32px 0 rgba(30,39,71,0.18); transform: translateY(-2px) scale(1.03); }
    .dashboard-card h3 { color: #38bdf8; font-size: 1.18rem; margin-bottom: 12px; letter-spacing: 0.5px; }
    .dashboard-card .value { font-size: 2.3rem; font-weight: 700; color: #a5eaff; margin-bottom: 4px; }
    .dashboard-card .desc { color: #b7bfd4; font-size: 1.04rem; margin-bottom: 0; }
    .main-content { margin: 0 auto; padding: 32px 5vw 32px 5vw; max-width: 1100px; width: 100%; }
    @media (max-width: 991px) {
      .dashboard-cards { gap: 12px; }
      .dashboard-card { min-width: 140px; max-width: 100vw; padding: 20px 10px 16px 10px; }
      .main-content { padding: 24px 2vw 24px 2vw; }
    }
    .nav-link { color: #b7bfd4; font-weight: 600; font-size: 1.08rem; margin: 0 10px; text-decoration: none; transition: color 0.2s; }
    .nav-link.active, .nav-link:hover { color: #38bdf8; text-decoration: underline; }
    .footer { text-align: center; padding: 18px 0 8px 0; color: #9aa5c0; font-size: 0.98rem; margin-top: 32px; border-top: 1px solid #232a4d; background: #15182b; }
  </style>
</head>
<body>
  <header class="tenant-header">
    <div class="logo"><i class="fa-solid fa-store"></i> Tenant Portal</div>
    <div class="brand">Your Brand Name <span class="badge bg-info">Live</span></div>
    <nav class="mt-3">
      <a href="#dashboard" class="nav-link active">Dashboard</a>
      <a href="#add-agent" class="nav-link">Add Agent</a>
      <a href="#catalog" class="nav-link">Catalog</a>
      <a href="#orders" class="nav-link">Orders</a>
      <a href="#llm-usage" class="nav-link">LLM Usage</a>
      <a href="#profile" class="nav-link">Profile</a>
      <a href="#help" class="nav-link">Help & Support</a>
    </nav>
  </header>
  <main class="main-content">
    <div id="tenant-spa-content">
      <!-- ...dashboard cards and SPA content... -->
    </div>
  </main>
  <footer class="footer">
    &copy; 2026 Alphadome Platform &mdash; Tenant Portal. Need help? <a href="mailto:support@alphadome.com" class="text-info">Contact Support</a>
  </footer>
  <!-- ...scripts and floating WhatsApp button... -->
</body>
</html>
