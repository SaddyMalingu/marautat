<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Tenant Portal | Alphadome</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <style>
    :root {
      --bg-main: #0f1117;
      --bg-card: #181c2f;
      --bg-sidebar: #13162a;
      --border: #1e2749;
      --accent: #38bdf8;
      --text-muted: #7c8db0;
      --text-light: #d4daf0;
      --success: #22d3a0;
      --warning: #f59e0b;
      --danger: #f43f5e;
    }
    *, *::before, *::after { box-sizing: border-box; }
    body { font-family: 'Inter', system-ui, Arial, sans-serif; background: var(--bg-main); color: var(--text-light); min-height: 100vh; margin: 0; }
    /* ─── App Shell ─── */
    .app-shell { display: grid; grid-template-columns: 240px 1fr; grid-template-rows: 60px 1fr; min-height: 100vh; }
    @media (max-width: 767px) { .app-shell { grid-template-columns: 1fr; } .sidebar { display: none; } .sidebar.open { display: flex; position: fixed; inset: 60px 0 0 0; z-index: 200; width: 240px; } }
    /* ─── Topbar ─── */
    .topbar { grid-column: 1 / -1; background: var(--bg-sidebar); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 20px; gap: 14px; position: sticky; top: 0; z-index: 100; }
    .topbar-brand { font-weight: 700; font-size: 1.05rem; color: var(--accent); flex: 1; }
    .topbar-user { font-size: 0.88rem; color: var(--text-muted); }
    .topbar-logout { font-size: 0.84rem; color: var(--danger); cursor: pointer; background: none; border: none; padding: 4px 10px; border-radius: 6px; transition: background 0.2s; }
    .topbar-logout:hover { background: rgba(244,63,94,0.13); }
    .topbar-menu-btn { display: none; background: none; border: none; color: var(--text-light); font-size: 1.2rem; cursor: pointer; }
    @media (max-width: 767px) { .topbar-menu-btn { display: block; } }
    /* ─── Sidebar ─── */
    .sidebar { background: var(--bg-sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 18px 0; overflow-y: auto; }
    .sidebar-label { font-size: 0.72rem; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; color: var(--text-muted); padding: 14px 20px 6px 20px; }
    .nav-item { display: flex; align-items: center; gap: 10px; padding: 10px 20px; cursor: pointer; font-size: 0.92rem; font-weight: 500; color: var(--text-muted); transition: all 0.15s; border-left: 3px solid transparent; user-select: none; }
    .nav-item:hover { background: rgba(56,189,248,0.07); color: var(--text-light); }
    .nav-item.active { background: rgba(56,189,248,0.12); color: var(--accent); border-left-color: var(--accent); }
    .nav-icon { width: 18px; text-align: center; font-size: 0.95rem; }
    /* ─── Main ─── */
    .main-area { overflow-y: auto; padding: 28px 28px 60px; background: var(--bg-main); }
    @media (max-width: 575px) { .main-area { padding: 16px 12px 60px; } }
    /* ─── Cards ─── */
    .section-hdr { font-size: 1.3rem; font-weight: 700; color: var(--text-light); margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
    .section-hdr i { color: var(--accent); }
    .stat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(165px, 1fr)); gap: 14px; margin-bottom: 22px; }
    .stat-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 14px; padding: 18px 16px; }
    .stat-label { font-size: 0.78rem; color: var(--text-muted); font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
    .stat-value { font-size: 2rem; font-weight: 700; color: var(--accent); line-height: 1; margin-bottom: 4px; }
    .stat-sub { font-size: 0.79rem; color: var(--text-muted); }
    .panel { background: var(--bg-card); border: 1px solid var(--border); border-radius: 14px; padding: 22px; margin-bottom: 18px; }
    .panel-title { font-size: 0.93rem; font-weight: 600; color: var(--text-light); margin-bottom: 16px; padding-bottom: 10px; border-bottom: 1px solid var(--border); }
    /* ─── Tables ─── */
    .table { color: var(--text-light); border-color: var(--border); }
    .table thead th { color: var(--text-muted); font-size: 0.77rem; text-transform: uppercase; letter-spacing: 0.5px; border-color: var(--border); background: var(--bg-main); font-weight: 600; }
    .table td, .table th { padding: 10px 12px; vertical-align: middle; border-color: var(--border); }
    .table tbody tr:hover { background: rgba(56,189,248,0.04); }
    /* ─── Forms ─── */
    .form-control, .form-select { background: var(--bg-main); border: 1px solid var(--border); color: var(--text-light); border-radius: 8px; }
    .form-control:focus, .form-select:focus { background: var(--bg-main); border-color: var(--accent); color: var(--text-light); box-shadow: 0 0 0 2px rgba(56,189,248,0.18); }
    .form-control::placeholder { color: var(--text-muted); }
    .form-label { font-size: 0.84rem; color: var(--text-muted); font-weight: 500; }
    .form-text { color: var(--text-muted); font-size: 0.78rem; }
    /* ─── Buttons ─── */
    .btn-accent { background: var(--accent); color: #0f1117; border: none; font-weight: 600; border-radius: 8px; padding: 8px 18px; transition: opacity 0.2s; }
    .btn-accent:hover { opacity: 0.88; color: #0f1117; }
    .btn-outline-acc { border: 1px solid var(--accent); color: var(--accent); background: transparent; border-radius: 8px; padding: 6px 14px; font-size: 0.85rem; transition: all 0.2s; }
    .btn-outline-acc:hover { background: rgba(56,189,248,0.12); color: var(--accent); }
    .btn-danger-out { border: 1px solid var(--danger); color: var(--danger); background: transparent; border-radius: 8px; padding: 5px 12px; font-size: 0.83rem; transition: all 0.2s; }
    .btn-danger-out:hover { background: rgba(244,63,94,0.12); color: var(--danger); }
    /* ─── Badges ─── */
    .badge-ok { background: rgba(34,211,160,0.15); color: var(--success); border: 1px solid rgba(34,211,160,0.3); border-radius: 20px; padding: 2px 9px; font-size: 0.74rem; font-weight: 600; }
    .badge-off { background: rgba(244,63,94,0.12); color: var(--danger); border: 1px solid rgba(244,63,94,0.25); border-radius: 20px; padding: 2px 9px; font-size: 0.74rem; font-weight: 600; }
    .badge-mid { background: rgba(245,158,11,0.15); color: var(--warning); border: 1px solid rgba(245,158,11,0.3); border-radius: 20px; padding: 2px 9px; font-size: 0.74rem; font-weight: 600; }
    /* ─── Toasts ─── */
    .toast-area { position: fixed; top: 70px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 8px; max-width: 340px; }
    .toast-msg { background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px; padding: 11px 15px; font-size: 0.88rem; display: flex; align-items: center; gap: 10px; box-shadow: 0 4px 20px rgba(0,0,0,0.4); animation: slideIn 0.2s ease; }
    .toast-ok { border-left: 3px solid var(--success); }
    .toast-err { border-left: 3px solid var(--danger); }
    @keyframes slideIn { from { transform: translateX(30px); opacity: 0; } to { transform: none; opacity: 1; } }
    /* ─── Login ─── */
    .login-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #0f1117 0%, #181c2f 100%); }
    .login-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 18px; padding: 40px 36px; width: 100%; max-width: 440px; box-shadow: 0 8px 40px rgba(0,0,0,0.4); }
    .login-logo { text-align: center; margin-bottom: 24px; }
    .login-logo i { font-size: 2.4rem; color: var(--accent); }
    .login-logo h2 { font-size: 1.4rem; font-weight: 700; margin-top: 8px; color: var(--text-light); }
    .login-logo p { font-size: 0.88rem; color: var(--text-muted); margin: 4px 0 0; }
    /* ─── Misc ─── */
    .spinner-sm { width: 16px; height: 16px; border-width: 2px; display: inline-block; vertical-align: text-bottom; }
    .app-hidden { display: none !important; }
    #floating-wa { position: fixed; right: 22px; bottom: 22px; z-index: 999; }
    #floating-wa img { width: 52px; height: 52px; border-radius: 50%; box-shadow: 0 4px 16px rgba(0,0,0,0.3); transition: transform 0.2s; display: block; }
    #floating-wa:hover img { transform: scale(1.08); }
    .bar-wrap { display: flex; flex-direction: column; gap: 8px; }
    .bar-row { display: flex; align-items: center; gap: 10px; font-size: 0.82rem; }
    .bar-label { width: 74px; color: var(--text-muted); flex-shrink: 0; }
    .bar-track { flex: 1; height: 7px; background: var(--bg-main); border-radius: 4px; overflow: hidden; }
    .bar-fill { height: 100%; background: var(--accent); border-radius: 4px; transition: width 0.5s; }
    .bar-count { width: 34px; text-align: right; color: var(--text-muted); }
    .kv-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; border-bottom: 1px solid var(--border); font-size: 0.88rem; }
    .kv-row:last-child { border-bottom: none; }
    .kv-key { color: var(--text-muted); }
  </style>
</head>
<body>

<div class="toast-area" id="toastArea"></div>

<!-- ── Login Screen ─────────────────────────────────────────────────────── -->
<div id="loginScreen" class="login-wrap">
  <div class="login-card">
    <div class="login-logo">
      <i class="fa-solid fa-store"></i>
      <h2>Tenant Portal</h2>
      <p>Powered by Alphadome</p>
    </div>
    <div id="loginAlert" class="mb-3" style="display:none;"></div>
    <form id="loginForm">
      <div class="mb-3"><label class="form-label">Business Phone Number</label><input type="text" class="form-control" id="lPhone" placeholder="e.g. 0702245555 or 254702245555" autocomplete="username" required /></div>
      <div class="mb-4"><label class="form-label">Dashboard Access Key</label><input type="password" class="form-control" id="lKey" placeholder="Your access key" autocomplete="current-password" required /></div>
      <button type="submit" class="btn btn-accent w-100" id="loginBtn"><i class="fa-solid fa-right-to-bracket me-2"></i>Sign In</button>
    </form>
    <div class="text-center mt-4" style="font-size:0.8rem;color:var(--text-muted);">Need help? <a href="https://wa.me/254786817637" target="_blank" style="color:var(--accent);">Chat on WhatsApp</a></div>
  </div>
</div>

<!-- ── App Shell ─────────────────────────────────────────────────────────── -->
<div id="appShell" class="app-shell app-hidden">
  <header class="topbar">
    <button class="topbar-menu-btn" id="menuBtn"><i class="fa-solid fa-bars"></i></button>
    <span class="topbar-brand"><i class="fa-solid fa-store me-2"></i>Tenant Portal</span>
    <span class="topbar-user" id="topUser"></span>
    <button class="topbar-logout" id="logoutBtn"><i class="fa-solid fa-right-from-bracket me-1"></i>Logout</button>
  </header>

  <nav class="sidebar" id="sidebar">
    <div class="sidebar-label">Overview</div>
    <div class="nav-item active" data-sec="home"><span class="nav-icon"><i class="fa-solid fa-gauge-high"></i></span>Dashboard</div>
    <div class="nav-item" data-sec="analytics"><span class="nav-icon"><i class="fa-solid fa-chart-line"></i></span>Analytics</div>

    <div class="sidebar-label">Store</div>
    <div class="nav-item" data-sec="catalog"><span class="nav-icon"><i class="fa-solid fa-box"></i></span>Product Catalog</div>
    <div class="nav-item" data-sec="orders"><span class="nav-icon"><i class="fa-solid fa-cart-shopping"></i></span>Orders</div>

    <div class="sidebar-label">Bot</div>
    <div class="nav-item" data-sec="training"><span class="nav-icon"><i class="fa-solid fa-robot"></i></span>Bot Training</div>
    <div class="nav-item" data-sec="bot-config"><span class="nav-icon"><i class="fa-solid fa-sliders"></i></span>Bot Config</div>
    <div class="nav-item" data-sec="broadcast"><span class="nav-icon"><i class="fa-solid fa-bullhorn"></i></span>Bulk Message</div>

    <div class="sidebar-label">Settings</div>
    <div class="nav-item" data-sec="profile"><span class="nav-icon"><i class="fa-solid fa-user"></i></span>Profile</div>
    <div class="nav-item" data-sec="smtp"><span class="nav-icon"><i class="fa-solid fa-envelope"></i></span>Email Setup</div>
    <div class="nav-item" data-sec="payments"><span class="nav-icon"><i class="fa-solid fa-credit-card"></i></span>Payments</div>

    <div class="sidebar-label">More</div>
    <div class="nav-item" data-sec="add-agent"><span class="nav-icon"><i class="fa-solid fa-user-plus"></i></span>Add Agent</div>
    <div class="nav-item" data-sec="help"><span class="nav-icon"><i class="fa-solid fa-circle-question"></i></span>Help &amp; Support</div>
  </nav>

  <main class="main-area" id="mainArea">
    <div id="spa"></div>
  </main>
</div>

<a href="https://wa.me/254786817637" target="_blank" id="floating-wa" title="Chat on WhatsApp"><img src="../images/whatsapp-3d.png" alt="WhatsApp" /></a>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
"use strict";
// ══════════════════════ STATE ══════════════════════════════════════════════
const STORAGE_KEY = 'td_v3';
const S = { key: new URLSearchParams(location.search).get('key') || '', token: '', phone: '', name: '', expires: null };
let curSec = 'home';

// ══════════════════════ TOAST ══════════════════════════════════════════════
function toast(msg, type = 'ok', ms = 4200) {
  const el = Object.assign(document.createElement('div'), { className: `toast-msg toast-${type}` });
  const icon = type === 'ok' ? 'fa-circle-check' : 'fa-circle-exclamation';
  const clr = type === 'ok' ? 'var(--success)' : 'var(--danger)';
  el.innerHTML = `<i class="fa-solid ${icon}" style="color:${clr};flex-shrink:0;"></i><span>${esc(msg)}</span>`;
  document.getElementById('toastArea').appendChild(el);
  setTimeout(() => el.remove(), ms);
}

// ══════════════════════ UTILS ══════════════════════════════════════════════
function esc(s) { return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
function fmtDate(d) { return d ? new Date(d).toLocaleDateString('en-KE',{year:'numeric',month:'short',day:'numeric'}) : '—'; }
function fmtDT(d) { return d ? new Date(d).toLocaleString('en-KE',{year:'numeric',month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}) : '—'; }
function badge(s) {
  const ok=['active','live','paid','delivered','completed','verified'];
  const off=['inactive','cancelled','failed','suspended'];
  const cls = ok.includes(String(s).toLowerCase()) ? 'badge-ok' : off.includes(String(s).toLowerCase()) ? 'badge-off' : 'badge-mid';
  return `<span class="${cls}">${esc(s)}</span>`;
}
function spinner(text='Loading…') { return `<div class="text-center p-5"><div class="spinner-border text-info spinner-sm"></div> <span style="color:var(--text-muted);margin-left:8px;">${esc(text)}</span></div>`; }

// ══════════════════════ SESSION ═══════════════════════════════════════════
function saveSession(d) {
  Object.assign(S, { token: d.token, phone: d.tenant_phone, name: d.tenant_name || '', expires: d.expires_at });
  sessionStorage.setItem(STORAGE_KEY, JSON.stringify(d));
}
function clearSession() { Object.assign(S, { token:'', phone:'', name:'', expires:null }); sessionStorage.removeItem(STORAGE_KEY); }
function loadSession() {
  const raw = sessionStorage.getItem(STORAGE_KEY);
  if (!raw) return false;
  try {
    const d = JSON.parse(raw);
    if (!d?.token || Date.parse(d.expires_at) <= Date.now()) { sessionStorage.removeItem(STORAGE_KEY); return false; }
    Object.assign(S, { token: d.token, phone: d.tenant_phone || '', name: d.tenant_name || '', expires: d.expires_at });
    return true;
  } catch { sessionStorage.removeItem(STORAGE_KEY); return false; }
}

// ══════════════════════ API ════════════════════════════════════════════════
async function api(url, opts = {}) {
  const headers = { ...(opts.headers || {}) };
  if (S.token) headers['x-tenant-session'] = S.token;
  const r = await fetch(url, { ...opts, headers });
  if (r.status === 401 && url.startsWith('/tenant/')) { clearSession(); showLogin('Session expired. Please sign in again.'); }
  return r;
}

async function apiJson(url, opts = {}) {
  const r = await api(url, opts);
  const d = await r.json().catch(() => ({ error: 'Invalid server response' }));
  return { ok: r.ok, status: r.status, data: d };
}

// ══════════════════════ AUTH ═══════════════════════════════════════════════
async function doLogin(phone, key) {
  const r = await fetch('/tenant/session/login', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ tenant_phone: phone, key }) });
  const d = await r.json().catch(() => ({ error: 'Invalid response' }));
  return { ok: r.ok, data: d };
}
async function doLogout() {
  if (S.token) fetch('/tenant/session/logout', { method: 'POST', headers: {'x-tenant-session': S.token} }).catch(()=>{});
  clearSession(); showLogin();
}

// ══════════════════════ SHOW / HIDE ═══════════════════════════════════════
function showLogin(msg = '') {
  document.getElementById('loginScreen').classList.remove('app-hidden');
  document.getElementById('appShell').classList.add('app-hidden');
  const al = document.getElementById('loginAlert');
  if (msg) { al.innerHTML = `<div class="alert alert-warning py-2 mb-0">${esc(msg)}</div>`; al.style.display = ''; }
  else al.style.display = 'none';
}
function showApp() {
  document.getElementById('loginScreen').classList.add('app-hidden');
  document.getElementById('appShell').classList.remove('app-hidden');
  document.getElementById('topUser').textContent = S.name || S.phone || 'Tenant';
}

// ══════════════════════ NAVIGATION ═══════════════════════════════════════
function go(sec) {
  curSec = sec;
  document.querySelectorAll('.nav-item[data-sec]').forEach(el => el.classList.toggle('active', el.dataset.sec === sec));
  document.getElementById('sidebar').classList.remove('open');
  const sp = document.getElementById('spa');
  sp.innerHTML = spinner();
  const map = { home:renderHome, analytics:renderAnalytics, catalog:renderCatalog, orders:renderOrders, training:renderTraining, 'bot-config':renderBotConfig, profile:renderProfile, smtp:renderSmtp, payments:renderPayments, 'add-agent':renderAddAgent, broadcast:renderBroadcast, help:renderHelp };
  (map[sec] || renderHome)();
}

function showErr(msg) {
  document.getElementById('spa').innerHTML = `<div class="text-center p-5"><i class="fa-solid fa-circle-exclamation fa-2x mb-3" style="color:var(--danger);"></i><div style="color:var(--danger);">${esc(msg)}</div><button class="btn btn-outline-acc mt-3" onclick="go('${esc(curSec)}')">Retry</button></div>`;
}

// ══════════════════════ HOME ═══════════════════════════════════════════════
async function renderHome() {
  document.getElementById('spa').innerHTML = `
    <div class="section-hdr"><i class="fa-solid fa-gauge-high"></i> Dashboard</div>
    <div class="stat-grid">
      <div class="stat-card"><div class="stat-label">Catalog</div><div class="stat-value" id="hC">—</div><div class="stat-sub">Products</div></div>
      <div class="stat-card"><div class="stat-label">Orders</div><div class="stat-value" id="hO">—</div><div class="stat-sub">All time</div></div>
      <div class="stat-card"><div class="stat-label">Training</div><div class="stat-value" id="hT">—</div><div class="stat-sub">FAQ entries</div></div>
      <div class="stat-card"><div class="stat-label">Conversations</div><div class="stat-value" id="hV">—</div><div class="stat-sub">All time</div></div>
    </div>
    <div class="row g-3">
      <div class="col-12 col-md-6">
        <div class="panel">
          <div class="panel-title"><i class="fa-solid fa-circle-dot me-2" style="color:var(--success);"></i>Bot Status</div>
          <div id="hBot" style="color:var(--text-muted);font-size:0.88rem;">Loading…</div>
        </div>
      </div>
      <div class="col-12 col-md-6">
        <div class="panel">
          <div class="panel-title"><i class="fa-solid fa-bolt me-2" style="color:var(--accent);"></i>Quick Access</div>
          <div class="d-flex flex-wrap gap-2">
            <button class="btn btn-outline-acc btn-sm" onclick="go('catalog')"><i class="fa-solid fa-box me-1"></i>Catalog</button>
            <button class="btn btn-outline-acc btn-sm" onclick="go('orders')"><i class="fa-solid fa-cart-shopping me-1"></i>Orders</button>
            <button class="btn btn-outline-acc btn-sm" onclick="go('training')"><i class="fa-solid fa-robot me-1"></i>Training</button>
            <button class="btn btn-outline-acc btn-sm" onclick="go('analytics')"><i class="fa-solid fa-chart-line me-1"></i>Analytics</button>
            <button class="btn btn-outline-acc btn-sm" onclick="go('smtp')"><i class="fa-solid fa-envelope me-1"></i>Email</button>
            <button class="btn btn-outline-acc btn-sm" onclick="go('payments')"><i class="fa-solid fa-credit-card me-1"></i>Payments</button>
            <button class="btn btn-outline-acc btn-sm" onclick="go('broadcast')"><i class="fa-solid fa-bullhorn me-1"></i>Bulk Message</button>
          </div>
        </div>
      </div>
    </div>`;

  const [cr, or, tr, ar, br] = await Promise.all([
    apiJson('/tenant/catalog'), apiJson('/tenant/orders'), apiJson('/tenant/training'),
    apiJson('/tenant/analytics'), apiJson('/tenant/bot-settings'),
  ]);
  const set = (id, v) => { const el = document.getElementById(id); if (el) el.textContent = v; };
  set('hC', (cr.data?.items || []).length);
  set('hO', (or.data?.orders || []).length);
  set('hT', (tr.data?.training || []).length);
  set('hV', ar.data?.analytics?.total_conversations ?? '—');
  const s = br.data?.settings || {};
  const botEl = document.getElementById('hBot');
  if (botEl) botEl.innerHTML = `
    <div class="kv-row"><span class="kv-key">Status</span>${badge(s.is_active ? 'active' : 'inactive')}</div>
    <div class="kv-row"><span class="kv-key">Verified</span>${s.is_verified ? '<span class="badge-ok">Yes</span>' : '<span class="badge-off">No</span>'}</div>

              <div class="col-12 col-md-5"><label class="form-label">Phone Number</label><input type="text" class="form-control" name="sp" placeholder="e.g. 254712345678" value="${esc(S.phone||'')}"/></div>

        </div>
      </div>
    </div>
    <div class="panel p-0" style="overflow:hidden;">

    }
  };
}

// ══════════════════════ HELP ═══════════════════════════════════════════════
async function renderBroadcast() {
  const sp = document.getElementById('spa');

  // ── Load audience preview + history in parallel ──
  let audienceData = { count: 0, users: [] };
  let historyData = { history: [] };
  try {
    [audienceData, historyData] = await Promise.all([
      api('/tenant/broadcast/audience?window_hours=168&segment=all').then(r => r.json()),
      api('/tenant/broadcast/history').then(r => r.json()),
    ]);
  } catch(e) { /* non-fatal */ }

  const sampleHtml = (audienceData.users || []).length
    ? `<div style="font-size:0.8rem;color:var(--text-muted);margin-top:6px;">Sample: ${esc((audienceData.users||[]).map(u=>u.name||u.phone).slice(0,4).join(', '))}${audienceData.count>4?` …+${audienceData.count-4} more`:''}</div>`
    : '';

  const segmentLabels = {
    all: "All Users",
    have_purchased: "Purchased Customers",
    inactive_30plus: "Inactive (30+ days)",
    high_value: "High Value (≥KES 1000)",
    first_time: "First-time Viewers (No Purchase)"
  };

  const histRows = (historyData.history || []).map(h => `
    <tr>
      <td style="font-size:0.82rem;">${esc(new Date(h.sent_at).toLocaleString())}</td>
      <td style="font-size:0.82rem;max-width:180px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;">${esc(h.message)}</td>
      <td><span class="badge-info" style="font-size:0.75rem;">${segmentLabels[h.segment]||h.segment}</span></td>
      <td><span class="badge-ok">${h.sent}</span></td>
      <td><span class="badge-off">${h.failed}</span></td>
    </tr>`).join('');

  sp.innerHTML = `
    <div class="section-hdr"><i class="fa-solid fa-bullhorn"></i> Bulk Message</div>

    <div class="alert" style="background:rgba(245,158,11,0.1);border:1px solid rgba(245,158,11,0.35);border-radius:10px;padding:12px 16px;font-size:0.84rem;color:var(--warning);margin-bottom:20px;">
      <i class="fa-solid fa-triangle-exclamation me-2"></i>
      <strong>WhatsApp Policy:</strong> Free-form messages can only be sent to users who messaged your bot within the past <strong>24 hours</strong>. For older users, Meta requires approved <em>message templates</em>. Use the 24h filter for best deliverability.
    </div>

    <div class="row g-3">
      <div class="col-12 col-lg-7">
        <div class="panel">
          <div class="panel-title">Compose Broadcast</div>

          <div class="row g-3 mb-3">
            <div class="col-12 col-sm-6">
              <label class="form-label">Audience Window</label>
              <select class="form-select" id="bcWindow">
                <option value="24">Last 24 hours</option>
                <option value="168" selected>Last 7 days</option>
                <option value="720">Last 30 days</option>
              </select>
              <div class="form-text">Only users who messaged the bot in this window will be targeted.</div>
            </div>
            <div class="col-12 col-sm-6">
              <label class="form-label">Customer Segment</label>
              <select class="form-select" id="bcSegment">
                <option value="all">All Users</option>
                <option value="have_purchased">Purchased Customers</option>
                <option value="inactive_30plus">Inactive (30+ days)</option>
                <option value="high_value">High Value (≥KES 1000)</option>
                <option value="first_time">First-time Viewers</option>
              </select>
              <div class="form-text">Narrow down your audience by customer type.</div>
            </div>
          </div>

          <div class="mb-3">
            <label class="form-label d-flex justify-content-between">
              Message
              <span id="bcCharCount" style="color:var(--text-muted);font-size:0.8rem;">0 / 1024</span>
            </label>
            <textarea class="form-control" id="bcMsg" rows="5" maxlength="1024"
              placeholder="Hi! We have a special offer just for you…"></textarea>
          </div>

          <div class="d-flex align-items-center gap-3 flex-wrap">
            <button class="btn btn-outline-acc" id="bcPreviewBtn"><i class="fa-solid fa-magnifying-glass me-1"></i>Preview Audience</button>
            <button class="btn btn-accent" id="bcSendBtn" disabled>
              <i class="fa-solid fa-paper-plane me-1"></i>Send Broadcast
            </button>
          </div>

          <div id="bcAudienceInfo" class="mt-3" style="background:var(--bg-main);border:1px solid var(--border);border-radius:8px;padding:12px;display:${audienceData.count>0?'block':'none'}">
            <span style="color:var(--success);"><i class="fa-solid fa-users me-1"></i>${audienceData.count} eligible user${audienceData.count!==1?'s':''}${audienceData.capped?' (capped at 500)':''}</span>
            ${sampleHtml}
          </div>

          <div id="bcResult" class="mt-3" style="display:none;"></div>
        </div>
      </div>

      <div class="col-12 col-lg-5">
        <div class="panel">
          <div class="panel-title">Broadcast History</div>
          ${histRows.length ? `
          <div class="table-responsive">
            <table class="table table-sm">
              <thead><tr><th>Sent</th><th>Message</th><th>Segment</th><th>✓</th><th>✗</th></tr></thead>
              <tbody id="bcHistBody">${histRows}</tbody>
            </table>
          </div>` : `<div style="color:var(--text-muted);font-size:0.88rem;">No broadcasts sent yet.</div>`}
        </div>
      </div>
    </div>`;

  // ── Char counter ──
  const msgEl = document.getElementById('bcMsg');
  const charEl = document.getElementById('bcCharCount');
  msgEl.addEventListener('input', () => {
    const len = msgEl.value.length;
    charEl.textContent = `${len} / 1024`;
    charEl.style.color = len > 900 ? 'var(--warning)' : 'var(--text-muted)';
  });

  // ── Preview audience (triggered by Preview or by changing window/segment) ──
  const previewAudience = async () => {
    const win = document.getElementById('bcWindow').value;
    const seg = document.getElementById('bcSegment').value;
    const info = document.getElementById('bcAudienceInfo');
    const btn = document.getElementById('bcPreviewBtn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner-border spinner-sm me-1"></span>Loading…';
    try {
      const r = await api(`/tenant/broadcast/audience?window_hours=${win}&segment=${seg}`);
      const d = await r.json();
      if (d.error) { toast(d.error, 'err'); return; }
      const sample = (d.users||[]).map(u=>esc(u.name||u.phone)).slice(0,4).join(', ');
      const more = d.count > 4 ? ` …+${d.count-4} more` : '';
      info.style.display = d.count > 0 ? 'block' : 'block';
      info.innerHTML = `<span style="color:var(--success);"><i class="fa-solid fa-users me-1"></i>${d.count} eligible user${d.count!==1?'s':''}${d.capped?' (capped at 500)':''}</span>${d.count>0?`<div style="font-size:0.8rem;color:var(--text-muted);margin-top:4px;">${sample}${more}</div>`:'<div style="font-size:0.8rem;color:var(--text-muted);margin-top:4px;">No users match this segment in the selected window.</div>'}`;
      document.getElementById('bcSendBtn').disabled = d.count === 0;
    } catch(e) { toast('Failed to fetch audience', 'err'); }
    finally { btn.disabled = false; btn.innerHTML = '<i class="fa-solid fa-magnifying-glass me-1"></i>Preview Audience'; }
  };

  document.getElementById('bcPreviewBtn').onclick = previewAudience;

  // Auto-update preview when window or segment changes
  document.getElementById('bcWindow').addEventListener('change', previewAudience);
  document.getElementById('bcSegment').addEventListener('change', previewAudience);

  // ── Send broadcast ──
  document.getElementById('bcSendBtn').onclick = async () => {
    const msg = msgEl.value.trim();
    const win = document.getElementById('bcWindow').value;
    const seg = document.getElementById('bcSegment').value;
    if (!msg) { toast('Please enter a message.', 'err'); return; }
    const audienceEl = document.getElementById('bcAudienceInfo');
    const countMatch = audienceEl.textContent.match(/(\d+) eligible/);
    const count = countMatch ? parseInt(countMatch[1]) : '?';
    const segLabel = segmentLabels[seg] || seg;
    if (!confirm(`Send to ${count} ${segLabel.toLowerCase()}?\n\nMessage preview:\n"${msg.slice(0,120)}${msg.length>120?'…':''}"\n\nThis cannot be undone.`)) return;

    const btn = document.getElementById('bcSendBtn');
    const result = document.getElementById('bcResult');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner-border spinner-sm me-1"></span>Sending…';
    result.style.display = 'none';

    try {
      const r = await api('/tenant/broadcast', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ message: msg, window_hours: parseInt(win), segment: seg }) });
      const d = await r.json();
      if (d.error) { toast(d.error, 'err'); return; }
      result.style.display = 'block';
      result.innerHTML = `<div style="background:rgba(34,211,160,0.08);border:1px solid rgba(34,211,160,0.3);border-radius:8px;padding:12px;">
        <i class="fa-solid fa-circle-check me-2" style="color:var(--success);"></i>
        <strong style="color:var(--success);">Broadcast complete!</strong><br>
        <span style="font-size:0.86rem;color:var(--text-muted);"><b style="color:var(--success);">${d.sent}</b> sent &nbsp;·&nbsp; <b style="color:var(--danger);">${d.failed}</b> failed &nbsp;·&nbsp; ${d.total} total</span>
      </div>`;
      toast(`Broadcast sent: ${d.sent} delivered`, 'ok');
      msgEl.value = '';
      charEl.textContent = '0 / 1024';
      // Refresh history
      setTimeout(() => renderBroadcast(), 1200);
    } catch(e) { toast('Broadcast failed: ' + e.message, 'err'); }
    finally { btn.disabled = false; btn.innerHTML = '<i class="fa-solid fa-paper-plane me-1"></i>Send Broadcast'; }
  };

  // Auto-enable send if there are already users loaded
  if (audienceData.count > 0) {
    document.getElementById('bcSendBtn').disabled = false;
  }
}

// ══════════════════════ BOOT ═══════════════════════════════════════════════
function boot() {
  document.querySelectorAll('.nav-item[data-sec]').forEach(el => el.addEventListener('click', () => go(el.dataset.sec)));
  document.getElementById('menuBtn').addEventListener('click', () => document.getElementById('sidebar').classList.toggle('open'));
  document.getElementById('logoutBtn').addEventListener('click', doLogout);

  document.getElementById('loginForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const phone = document.getElementById('lPhone').value.trim();
    const key = document.getElementById('lKey').value.trim() || S.key;
    if (!phone || !key) { toast('Phone and key are required.','err'); return; }
    const btn = document.getElementById('loginBtn');
    btn.disabled = true; btn.innerHTML = '<span class="spinner-border spinner-sm me-2"></span>Signing in…';
    const { ok, data } = await doLogin(phone, key);
    btn.disabled = false; btn.innerHTML = '<i class="fa-solid fa-right-to-bracket me-2"></i>Sign In';
    if (!ok || data.error) {
      const al = document.getElementById('loginAlert');
      al.innerHTML = `<div class="alert alert-danger py-2 mb-0">${esc(data.error||'Login failed')}</div>`;
      al.style.display = ''; return;
    }
    // Persist key if just entered
    if (data.token && !S.key) S.key = key;
    saveSession(data); showApp(); go('home');
  });

  if (!S.key) { showLogin('Missing key in URL. Open /tenant-dashboard?key=YOUR_KEY'); return; }
  if (loadSession()) { showApp(); go('home'); return; }
  showLogin();
}

boot();
